<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="google-site-verification" content="osZgdSLYnqidzCKt4CxjqAxo44OqGvlKi-Bmg0UmxFQ" />
<title>The Anti-Pattern Museum — thousands of rules of professional judgment</title>
<meta name="description" content="Every 'do not' in the library, browsable: thousands of professional anti-patterns — the mistakes that make smart people produce weak work — searchable, filterable, and shareable one rule at a time." />
<link rel="stylesheet" href="styles.css" />
<style>
  .mu-wrap { max-width: 820px; margin: 0 auto; padding: 16px 22px 70px; }
  #q { width: 100%; padding: 12px 15px; font-size: 15px; background: #0d1117; color: var(--fg); border: 1px solid var(--border); border-radius: 12px; box-sizing: border-box; margin: 12px 0; }
  .exhibit { border: 1px solid var(--border); border-left: 4px solid hsl(var(--h,265) 60% 55%); border-radius: 12px; background: var(--panel); padding: 14px 18px; margin: 10px 0; }
  .exhibit .t { font-size: 15px; line-height: 1.55; }
  .exhibit .m { color: var(--muted); font-size: 11.5px; margin-top: 8px; display: flex; justify-content: space-between; }
  .exhibit .m a { color: var(--accent); text-decoration: none; }
  .featured { border: 2px solid #c9a227; background: linear-gradient(160deg,#141018,#241a30); padding: 22px; border-radius: 16px; margin: 14px 0; }
  .featured .t { font-size: 19px; font-family: Georgia, serif; color: #f4e6bf; }
  .count { color: var(--muted); font-size: 12.5px; text-align: center; }
  .share { background: none; border: 0; color: var(--accent); cursor: pointer; font-size: 11.5px; padding: 0; }
</style>
</head>
<body>
<header class="topbar">
  <div class="brand"><img src="assets/product-notes.jpg" alt="" class="brand-logo" />
    <div class="brand-text"><h1>The Anti-Pattern Museum</h1><p class="tagline">The mistakes that make smart people produce weak work.</p></div></div>
</header>
<nav class="toolbar-nav" id="toolbar" aria-label="Tools"></nav>

<div class="mu-wrap">
  <div class="featured" id="featured"></div>
  <input id="q" type="search" placeholder='Search the museum… try "average", "blame", "vague", "denominator"' />
  <div class="count" id="count"></div>
  <div id="hall"></div>
</div>

<script>
const el = (id) => document.getElementById(id);
let R = [], shown = 0;
const hue = (s) => { let h = 2166136261; for (let i = 0; i < s.length; i++) { h ^= s.charCodeAt(i); h = Math.imul(h, 16777619); } return (h >>> 0) % 360; };
const esc = (s) => s.replace(/&/g, '&amp;').replace(/</g, '&lt;');

function card(r, i) {
  return '<div class="exhibit" style="--h:' + hue(r.s) + '">' +
    '<div class="t">' + esc(r.t) + '</div>' +
    '<div class="m"><span>from <a href="skill/' + r.s + '.html">' + r.s + '</a> · ' + r.p + '</span>' +
    '<button class="share" data-i="' + i + '">🔗 share this rule</button></div></div>';
}
function share(r) {
  const text = '“' + r.t + '”\n— ' + r.s + ', the Anti-Pattern Museum\n' + location.origin + location.pathname + '#' + encodeURIComponent(r.s);
  if (navigator.share) { navigator.share({ text }).catch(() => {}); return; }
  navigator.clipboard.writeText(text);
  if (window.pmTrack) pmTrack('museum/share');
}
function render() {
  const q = el('q').value.toLowerCase().trim();
  const hit = q ? R.map((r, i) => [r, i]).filter(([r]) => r.t.toLowerCase().includes(q) || r.s.includes(q) || r.p.includes(q)) : R.map((r, i) => [r, i]);
  shown = Math.min(hit.length, 60);
  el('count').textContent = q ? hit.length + ' of ' + R.length + ' rules match' : R.length + ' rules on display — search, or refresh for a new exhibit of the day';
  el('hall').innerHTML = hit.slice(0, 60).map(([r, i]) => card(r, i)).join('');
  el('hall').querySelectorAll('.share').forEach((b) => b.onclick = () => share(R[+b.dataset.i]));
}
fetch('museum.json').then((r) => r.json()).then((d) => {
  R = d.rules;
  // Exhibit of the day — deterministic by date, same for everyone (shareable).
  const day = Math.floor(Date.now() / 86400000);
  const f = R[((day * 2654435761) % R.length + R.length) % R.length];
  el('featured').innerHTML = '<div class="mu-eyebrow" style="font-size:11px;letter-spacing:.15em;color:#c9a227">EXHIBIT OF THE DAY</div>' +
    '<div class="t">“' + esc(f.t) + '”</div>' +
    '<div class="m" style="color:#9a8f70;font-size:12px;margin-top:10px">from <a style="color:#c9a227" href="skill/' + f.s + '.html">' + f.s + '</a> · <button class="share" id="shareF">🔗 share</button></div>';
  el('shareF').onclick = () => share(f);
  const want = decodeURIComponent(location.hash.slice(1));
  if (want) { el('q').value = want; }
  render();
  window.__museumReady = R.length;
  if (window.pmTrack) pmTrack('museum/open');
});
el('q').addEventListener('input', render);
</script>
<script src="i18n.js"></script>
<script src="nav.js"></script>
</body>
</html>
