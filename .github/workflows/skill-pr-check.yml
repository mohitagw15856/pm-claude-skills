name: Skill PR Check (structure)

# Every PR that touches skills/ gets a fast, free structural quality gate:
#   - skillcheck validates structure (frontmatter, required sections) — no API, no cost.
# Skills are NOT eval-scored on the PR. Scoring is decided later, after merge, via the
# manual "Evaluate selected bundles" Action (.github/workflows/eval-bundles.yml) — so
# opening a PR never spends tokens, and you choose when/what to score.

on:
  pull_request:
    paths:
      - 'skills/**'
      - 'evals/cases.json'

permissions:
  contents: read
  pull-requests: write

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # need origin/main to diff changed skills for the comment

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Structure check (skillcheck)
        id: skillcheck
        run: |
          if node scripts/skillcheck.mjs; then echo "result=pass" >> "$GITHUB_OUTPUT"; else echo "result=fail" >> "$GITHUB_OUTPUT"; exit 1; fi

      - name: Build PR comment
        if: ${{ always() }}
        env:
          BASE_REF: origin/main
          SKILLCHECK: ${{ steps.skillcheck.outputs.result }}
        run: node scripts/pr-eval-comment.mjs > /tmp/skill-pr-comment.md

      - name: Post / update PR comment
        if: ${{ always() }}
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('/tmp/skill-pr-comment.md', 'utf8');
            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;
            const marker = '## 🤖 Skill PR check';
            const comments = await github.rest.issues.listComments({ owner, repo, issue_number });
            const mine = comments.data.find(c => c.body && c.body.startsWith(marker));
            if (mine) await github.rest.issues.updateComment({ owner, repo, comment_id: mine.id, body });
            else await github.rest.issues.createComment({ owner, repo, issue_number, body });
