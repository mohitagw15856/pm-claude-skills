name: Refresh feedback ratings

# Aggregates the playground's opt-in 👍/👎 ratings from GoatCounter into web/feedback.json so
# skills can show a real "👍 92% · 24 ratings" proof badge. The API token stays in repo secrets
# (never in the client). No token configured → the script no-ops, so this is harmless. Uses the
# same GOATCOUNTER_TOKEN secret as the trending workflow.

on:
  schedule:
    - cron: '0 7 * * 1'   # Mondays 07:00 UTC (alongside trending)
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  feedback:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Build feedback.json
        env:
          GOATCOUNTER_TOKEN: ${{ secrets.GOATCOUNTER_TOKEN }}
          GOATCOUNTER_SITE: mohitagw
        run: node scripts/build-feedback.mjs
      - name: Open a PR with the refreshed feedback data
        uses: peter-evans/create-pull-request@v7
        with:
          add-paths: web/feedback.json
          branch: feedback-data
          delete-branch: true
          commit-message: "chore(feedback): refresh 👍/👎 ratings from usage"
          title: "chore(feedback): refresh skill ratings"
          body: |
            Auto-generated by the **Refresh feedback ratings** workflow from GoatCounter usage.
            Merging this updates the "👍 helpful%" proof badges on the playground.
