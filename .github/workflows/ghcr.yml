# Publishes the Org Edition container to GitHub Container Registry on every
# release tag: docker run ghcr.io/mohitagw15856/pm-skills
name: Publish container (ghcr)
on:
  push:
    tags: ['v*']
  workflow_dispatch:
permissions:
  contents: read
  packages: write
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with: { registry: ghcr.io, username: '${{ github.actor }}', password: '${{ secrets.GITHUB_TOKEN }}' }
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/pm-skills:latest
            ghcr.io/${{ github.repository_owner }}/pm-skills:${{ github.ref_name }}
