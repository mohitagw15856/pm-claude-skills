name: Update Skill Leaderboard

# Runs the eval harness with your ANTHROPIC_API_KEY secret, commits the real
# results (evals/results.json), and lets the Pages deploy re-render the public
# leaderboard with real numbers. Manual trigger so it never burns tokens by
# surprise. (Uncomment the schedule to re-run, e.g. monthly, after model upgrades.)

on:
  workflow_dispatch:
    inputs:
      scope:
        description: 'What to score'
        type: choice
        required: false
        default: 'unscored'
        options:
          - unscored   # only skills with no score yet — the cheap way to finish the library (additive)
          - bundle     # only the bundle(s) named below (additive)
          - curated    # the ~20 hand-written curated cases
          - all        # every skill (auto-generated cases, ~$2+ on Haiku)
      bundle:
        description: 'For scope=bundle: comma-separated bundle name(s), e.g. pm-ai,pm-growth (see .claude-plugin/marketplace.json for names)'
        required: false
        default: ''
      models:
        description: 'Comma-separated model ids to score'
        required: false
        default: 'claude-sonnet-4-6,claude-haiku-4-5-20251001'
      judge:
        description: 'Judge model id (Sonnet is ~5x cheaper than Opus and fine for the rubric)'
        required: false
        default: 'claude-sonnet-4-6'
      seed_branch:
        description: 'Reuse prior results from this branch (e.g. eval-results) so a re-run only re-scores skills whose SKILL.md or eval case changed — pennies, not dollars. Empty = start from main.'
        required: false
        default: ''
  # schedule:
  #   - cron: '0 6 1 * *'   # 06:00 on the 1st of each month

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: eval-leaderboard
  cancel-in-progress: false

jobs:
  evaluate:
    runs-on: ubuntu-latest
    timeout-minutes: 50
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Seed prior results (keep existing scores)
        run: |
          # Targeted modes (unscored / bundle) must be ADDITIVE — keep the scores already
          # earned and only add/refresh the targeted skills. So default-seed from the
          # eval-results branch unless the dispatcher named a different seed_branch.
          SCOPE="${{ github.event.inputs.scope || 'unscored' }}"
          BR="${{ github.event.inputs.seed_branch }}"
          if [ -z "$BR" ] && { [ "$SCOPE" = "unscored" ] || [ "$SCOPE" = "bundle" ]; }; then BR="eval-results"; fi
          if [ -z "$BR" ]; then echo "No seed branch — starting from main's results."; exit 0; fi
          if git fetch origin "$BR" >/dev/null 2>&1 && git cat-file -e "origin/$BR:evals/results.json" 2>/dev/null; then
            git show "origin/$BR:evals/results.json" > evals/results.json
            echo "Seeded evals/results.json from origin/$BR — $(node -e "console.log(require('./evals/results.json').results.length)") prior results kept; only the targeted/changed skills will (re)score."
          else
            echo "::warning::Branch '$BR' or its evals/results.json not found — starting from main."
          fi

      - name: Run evals
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "::error::ANTHROPIC_API_KEY secret is not set. Add it in Settings → Secrets and variables → Actions."
            exit 1
          fi
          SCOPE="${{ github.event.inputs.scope || 'unscored' }}"
          BUNDLE="${{ github.event.inputs.bundle }}"
          MODELS="${{ github.event.inputs.models || 'claude-sonnet-4-6,claude-haiku-4-5-20251001' }}"
          JUDGE="${{ github.event.inputs.judge || 'claude-sonnet-4-6' }}"
          # Targeted/full passes default to cheap Haiku unless the dispatcher overrode models/judge.
          if [ "$SCOPE" != "curated" ]; then
            if [ "$MODELS" = "claude-sonnet-4-6,claude-haiku-4-5-20251001" ]; then MODELS="claude-haiku-4-5-20251001"; fi
            if [ "$JUDGE" = "claude-sonnet-4-6" ]; then JUDGE="claude-haiku-4-5-20251001"; fi
          fi

          case "$SCOPE" in
            unscored)
              echo "Scoring ONLY unscored skills (additive) — models=$MODELS judge=$JUDGE"
              node scripts/gen-eval-cases.mjs
              node evals/run-evals.mjs --cases evals/cases.full.json --unevaluated --models "$MODELS" --judge "$JUDGE"
              ;;
            bundle)
              if [ -z "$BUNDLE" ]; then
                echo "::error::scope=bundle but no 'bundle' input given. Re-run and set e.g. bundle=pm-ai,pm-growth."
                exit 1
              fi
              echo "Scoring bundle(s) '$BUNDLE' (additive) — models=$MODELS judge=$JUDGE"
              node scripts/gen-eval-cases.mjs
              node evals/run-evals.mjs --cases evals/cases.full.json --bundles "$BUNDLE" --models "$MODELS" --judge "$JUDGE"
              ;;
            all)
              echo "Scoring ALL skills — models=$MODELS judge=$JUDGE"
              node scripts/gen-eval-cases.mjs
              node evals/run-evals.mjs --cases evals/cases.full.json --models "$MODELS" --judge "$JUDGE"
              ;;
            *)
              echo "Scoring curated cases — models=$MODELS judge=$JUDGE"
              node evals/run-evals.mjs --models "$MODELS" --judge "$JUDGE"
              ;;
          esac
          # Cheap by default; skips unchanged skills. For a stricter official pass,
          # dispatch with judge=claude-opus-4-8.

      - name: Build the leaderboard page (sanity check)
        run: node scripts/build-leaderboard.mjs

      - name: Open a PR with the refreshed results
        uses: peter-evans/create-pull-request@v7
        with:
          add-paths: evals/results.json
          branch: eval-results
          delete-branch: true
          commit-message: "chore(evals): refresh leaderboard results"
          title: "chore(evals): refresh leaderboard results"
          body: |
            Auto-generated by the **Update Skill Leaderboard** workflow.

            Merging this publishes the **real** numbers on the live leaderboard — the
            Pages deploy is triggered by changes to `evals/results.json`.
